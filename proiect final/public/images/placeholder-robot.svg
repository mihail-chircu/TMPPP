<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background -->
  <rect width="400" height="400" fill="#faf5ff" rx="16"/>

  <!-- Grid dots decoration -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="1.5" fill="#e9d5ff" opacity="0.5"/>
  </pattern>
  <rect width="400" height="400" fill="url(#dots)" rx="16"/>

  <!-- Robot body -->
  <g transform="translate(200, 190)">
    <!-- Antenna -->
    <line x1="0" y1="-90" x2="0" y2="-70" stroke="#c084fc" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="-95" r="6" fill="#f59e0b" stroke="#f59e0b" stroke-width="1">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Head -->
    <rect x="-45" y="-68" width="90" height="68" rx="18" fill="#c084fc" stroke="#a855f7" stroke-width="2"/>

    <!-- Eyes -->
    <circle cx="-18" cy="-40" r="12" fill="white" stroke="#a855f7" stroke-width="1.5"/>
    <circle cx="18" cy="-40" r="12" fill="white" stroke="#a855f7" stroke-width="1.5"/>
    <!-- Pupils -->
    <circle cx="-15" cy="-38" r="5" fill="#581c87">
      <animate attributeName="cx" values="-15;-21;-15" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="21" cy="-38" r="5" fill="#581c87">
      <animate attributeName="cx" values="21;15;21" dur="4s" repeatCount="indefinite"/>
    </circle>
    <!-- Eye shine -->
    <circle cx="-17" cy="-42" r="2" fill="white" opacity="0.8"/>
    <circle cx="19" cy="-42" r="2" fill="white" opacity="0.8"/>

    <!-- Mouth - confused/oops expression -->
    <path d="M-12,-14 Q-6,-10 0,-14 Q6,-18 12,-14" stroke="#7c3aed" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Cheek blush -->
    <ellipse cx="-30" cy="-20" rx="8" ry="5" fill="#f9a8d4" opacity="0.5"/>
    <ellipse cx="30" cy="-20" rx="8" ry="5" fill="#f9a8d4" opacity="0.5"/>

    <!-- Neck -->
    <rect x="-10" y="0" width="20" height="12" rx="3" fill="#a78bfa"/>

    <!-- Body -->
    <rect x="-50" y="12" width="100" height="75" rx="16" fill="#c084fc" stroke="#a855f7" stroke-width="2"/>

    <!-- Belly panel -->
    <rect x="-30" y="24" width="60" height="40" rx="10" fill="#ede9fe" stroke="#a855f7" stroke-width="1.5"/>

    <!-- Warning/error icon on belly -->
    <g transform="translate(0, 44)">
      <!-- Triangle -->
      <path d="M0,-16 L14,8 L-14,8 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5" stroke-linejoin="round"/>
      <!-- Exclamation -->
      <line x1="0" y1="-10" x2="0" y2="-2" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="0" cy="3" r="1.5" fill="#92400e"/>
    </g>

    <!-- Arms -->
    <!-- Left arm -->
    <rect x="-66" y="18" width="14" height="50" rx="7" fill="#a78bfa" stroke="#9333ea" stroke-width="1.5"/>
    <!-- Left hand -->
    <circle cx="-59" cy="72" r="9" fill="#c084fc" stroke="#a855f7" stroke-width="1.5"/>

    <!-- Right arm raised (waving) -->
    <g transform="translate(59, 18)">
      <rect x="0" y="0" width="14" height="50" rx="7" fill="#a78bfa" stroke="#9333ea" stroke-width="1.5" transform="rotate(-20, 7, 0)"/>
      <circle cx="20" cy="-8" r="9" fill="#c084fc" stroke="#a855f7" stroke-width="1.5">
        <animate attributeName="cy" values="-8;-12;-8" dur="1.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Legs -->
    <rect x="-28" y="87" width="18" height="30" rx="8" fill="#a78bfa" stroke="#9333ea" stroke-width="1.5"/>
    <rect x="10" y="87" width="18" height="30" rx="8" fill="#a78bfa" stroke="#9333ea" stroke-width="1.5"/>

    <!-- Feet -->
    <rect x="-32" y="113" width="26" height="12" rx="6" fill="#c084fc" stroke="#a855f7" stroke-width="1.5"/>
    <rect x="6" y="113" width="26" height="12" rx="6" fill="#c084fc" stroke="#a855f7" stroke-width="1.5"/>
  </g>

  <!-- Text -->
  <text x="200" y="348" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#7c3aed">
    Ups! Imaginea lipseste
  </text>
  <text x="200" y="368" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#a78bfa">
    Revenim cu o poza frumoasa!
  </text>

  <!-- Decorative sparkles -->
  <g fill="#fbbf24" opacity="0.6">
    <path d="M60,60 L63,54 L66,60 L72,63 L66,66 L63,72 L60,66 L54,63 Z" transform="scale(0.7)">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M60,60 L63,54 L66,60 L72,63 L66,66 L63,72 L60,66 L54,63 Z" transform="translate(310, 70) scale(0.5)">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M60,60 L63,54 L66,60 L72,63 L66,66 L63,72 L60,66 L54,63 Z" transform="translate(340, 290) scale(0.6)">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Small gears decoration -->
  <g transform="translate(55, 310)" opacity="0.3">
    <circle cx="0" cy="0" r="10" stroke="#a78bfa" stroke-width="2" fill="none">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="4" fill="#a78bfa"/>
  </g>
  <g transform="translate(72, 325)" opacity="0.2">
    <circle cx="0" cy="0" r="7" stroke="#c084fc" stroke-width="1.5" fill="none">
      <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="3" fill="#c084fc"/>
  </g>
</svg>
